<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a365d">
  <title>学習ノート</title>
  <link rel="stylesheet" href="common.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .site-nav {
      background: var(--primary);
      padding: .7rem 1.5rem;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .site-name {
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .portal-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 1.5rem 4rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
      color: var(--primary);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 18px;
      width: 100%;
      max-width: 820px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 34px 20px;
      text-decoration: none;
      color: #333;
      box-shadow: var(--shadow-sm);
      border-top: 4px solid var(--primary);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    a.card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
      text-decoration: none;
    }
    .card .icon { font-size: 2.2rem; margin-bottom: 12px; }
    .card .title { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .card .sub { font-size: 0.78rem; color: #888; margin-top: 5px; }
    .site-footer {
      background: var(--primary);
      color: rgba(255,255,255,.5);
      text-align: center;
      padding: .9rem 1rem;
      font-size: .75rem;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <span class="site-name">学習ノート</span>
  </nav>
  <main class="portal-main">
    <h1>教科一覧</h1>
    <div class="grid">
      <a class="card" href="熱力学/">
        <div class="icon">🌡️</div>
        <div class="title">熱力学</div>
        <div class="sub">講義ノート</div>
      </a>
      <a class="card" href="線形代数学/">
        <div class="icon">📐</div>
        <div class="title">線形代数学</div>
        <div class="sub">講義ノート</div>
      </a>
      <a class="card" href="現代経済理論/">
        <div class="icon">📈</div>
        <div class="title">現代経済理論</div>
        <div class="sub">過去問解説</div>
      </a>
      <a class="card" href="すかき演習/">
        <div class="icon">✏️</div>
        <div class="title">すかき演習</div>
        <div class="sub">微積・線形代数</div>
      </a>
    </div>
  </main>
  <footer class="site-footer">学習ノート &mdash; 2026年 Sターム</footer>
<script src="common.js"></script>
</body>
</html>
