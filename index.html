<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a365d">
  <title>学習ノート</title>
  <link rel="stylesheet" href="common.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }
    /* ── ポータルヒーロー（共通 .hero より少し大きめのパディング） ── */
    .portal-hero { padding: 56px 24px 52px; }
    .portal-hero h1 { font-size: 2.2rem; letter-spacing: .06em; }
    /* ── カードグリッド ── */
    .portal-main {
      flex: 1;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      padding: 2.8rem 1.5rem 4rem;
    }
    .section-label {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 20px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 20px 28px;
      text-decoration: none;
      color: #333;
      box-shadow: var(--shadow-sm);
      border-top: 4px solid var(--primary);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    a.card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
      text-decoration: none;
    }
    .card .icon { font-size: 2.4rem; margin-bottom: 14px; }
    .card .title { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .card .sub { font-size: 0.78rem; color: #999; margin-top: 5px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="navbar-brand">学習ノート</span>
    <div class="navbar-links">
      <a href="index.html" class="active">ホーム</a>
    </div>
  </div>
</nav>

<div class="hero portal-hero">
  <h1>学習ノート</h1>
  <p class="subtitle">東京大学 2026年 Sターム</p>
</div>

<main class="portal-main">
  <div class="section-label">教科一覧</div>
  <div class="grid">
    <a class="card" href="熱力学/">
      <div class="icon">🌡️</div>
      <div class="title">熱力学</div>
      <div class="sub">講義ノート</div>
    </a>
    <a class="card" href="線形代数学/">
      <div class="icon">📐</div>
      <div class="title">線形代数学</div>
      <div class="sub">講義ノート</div>
    </a>
    <a class="card" href="現代経済理論/">
      <div class="icon">📈</div>
      <div class="title">現代経済理論</div>
      <div class="sub">過去問解説</div>
    </a>
    <a class="card" href="すかき演習/">
      <div class="icon">✏️</div>
      <div class="title">すかき演習</div>
      <div class="sub">微積・線形代数</div>
    </a>
  </div>
</main>

<footer class="site-footer">学習ノート &mdash; 2026年 Sターム</footer>

<script src="common.js"></script>
</body>
</html>
