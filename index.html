<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習ノート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 48px;
      letter-spacing: 0.05em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 800px;
    }
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: 12px;
      padding: 36px 20px;
      text-decoration: none;
      color: #333;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    a.card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }
    .card .icon { font-size: 2.4rem; margin-bottom: 14px; }
    .card .title { font-size: 1rem; font-weight: 600; }
    .card .sub { font-size: 0.8rem; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>学習ノート</h1>
  <div class="grid">
    <a class="card" href="熱力学/">
      <div class="icon">🌡️</div>
      <div class="title">熱力学</div>
      <div class="sub">講義ノート</div>
    </a>
    <a class="card" href="線形代数学/">
      <div class="icon">📐</div>
      <div class="title">線形代数学</div>
      <div class="sub">講義ノート</div>
    </a>
    <a class="card" href="現代経済理論/">
      <div class="icon">📈</div>
      <div class="title">現代経済理論</div>
      <div class="sub">過去問解説</div>
    </a>
    <a class="card" href="すかき演習/">
      <div class="icon">✏️</div>
      <div class="title">すかき演習</div>
      <div class="sub">微積・線形代数</div>
    </a>
  </div>
</body>
</html>
